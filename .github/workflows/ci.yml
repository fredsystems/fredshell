name: CI

on:
  pull_request:
  merge_group:
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

jobs:
  nix-checks:
    name: Nix devShell checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          fetch-depth: 0

      - name: Set up Determinate Nix
        uses: DeterminateSystems/determinate-nix-action@bafaa638b9d5ec0e7e3ac1a7fc80453ef1fd265f # v3

      - name: Use Determinate Cache
        uses: DeterminateSystems/magic-nix-cache-action@908b263ff629f4cc17666315b7fd3ec127c6244d # v14
        with:
          use-flakehub: false
          use-gha-cache: false

      - name: Run checks in devShell
        run: |
          nix develop --impure --command bash -e -c '
            set -euxo pipefail
            pre-commit run --all-files
          '

  check:
    name: Check ${{ matrix.os }} ${{ matrix.toolchain }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
        toolchain: ["stable", "nightly"]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9 # master
        with:
          toolchain: ${{ matrix.toolchain }}
          # `cargo xtask check` runs `cargo fmt` and `cargo clippy`,
          # whose components are not in the default nightly profile.
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
      # `cargo xtask check` invokes `cargo-machete` as part of the
      # mandatory verification suite. The bare runner has no nix
      # devShell, so install it explicitly here.
      - uses: taiki-e/install-action@bffeee26d4db9be238a4ea78d8826604ebcb594d # v2.82.5
        with:
          tool: cargo-machete
      - run: cargo xtask check

  compat:
    name: Spec compat report
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          fetch-depth: 0

      - name: Set up Determinate Nix
        uses: DeterminateSystems/determinate-nix-action@bafaa638b9d5ec0e7e3ac1a7fc80453ef1fd265f # v3

      - name: Use Determinate Cache
        uses: DeterminateSystems/magic-nix-cache-action@908b263ff629f4cc17666315b7fd3ec127c6244d # v14
        with:
          use-flakehub: false
          use-gha-cache: false

      - name: Run cargo xtask compat
        run: |
          nix develop --impure --command bash -e -c '
            set -euxo pipefail
            mkdir -p target
            cargo xtask compat --json target/compat.json
          '

      - name: Upload compat report
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: compat-report
          path: target/compat.json
          if-no-files-found: error
          retention-days: 30

  ci-success:
    name: CI Success
    runs-on: ubuntu-latest
    needs:
      - nix-checks
      - check
      - compat
    if: always()
    steps:
      - run: |
          if [[ "${{ needs.nix-checks.result }}" != "success" ]]; then
            echo "nix-checks failed"; exit 1
          fi
          if [[ "${{ needs.check.result }}" != "success" ]]; then
            echo "check matrix failed"; exit 1
          fi
          if [[ "${{ needs.compat.result }}" != "success" ]]; then
            echo "compat failed"; exit 1
          fi
          echo "All CI jobs succeeded"
